<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Energy Generated Vs Consumed — Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --card-fill: linear-gradient(124deg, rgba(255, 255, 255, 0) -22.38%, rgba(255, 255, 255, 0.04) 70.38%);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    background: radial-gradient(120% 120% at 50% 0%, #0b1020 0%, #04060e 60%, #010208 100%);
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
  }

  /* ---------- Card frame ---------- */
  .energy-card {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 361px;
    padding: 20px;
    border-radius: 20px;
    border: 2px solid rgba(255, 255, 255, 0.10);
    background: var(--card-fill), rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(21px);
    -webkit-backdrop-filter: blur(21px);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
  }

  /* ---------- Header ---------- */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 30px;
    gap: 8px;
  }

  .card-header h2 {
    margin: 0;
    color: #fff;
    opacity: 0.85;
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 14px;
    font-weight: 700;
    line-height: normal;
    white-space: nowrap;
  }

  .period-select {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    height: 30px;
    padding: 0 14px;
    border-radius: 100px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.04);
    color: #fff;
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .period-select svg { flex: 0 0 auto; }

  /* ---------- Chart ---------- */
  .power-output-chart { display: block; width: 100%; height: auto; }

  .power-axis-label {
    fill: #d0d5dd;
    font-family: Inter, sans-serif;
    font-size: 9px;
    font-weight: 500;
  }

  /* ---------- Series control (toggles) ---------- */
  .power-series-control {
    display: grid;
    width: 100%;
    height: 44px;
    grid-template-columns: 1fr 1px 1fr;
    align-items: center;
    border-radius: 100px;
    background: rgba(255, 255, 255, 0.04);
  }

  .series-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0;
    border: 0;
    background: transparent;
    color: inherit;
    font: inherit;
    cursor: pointer;
  }

  .series-toggle small {
    color: rgba(255, 255, 255, 0.8);
    opacity: 0.85;
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 13px;
    font-weight: 400;
  }

  .series-divider { width: 1px; height: 18px; background: rgba(255, 255, 255, 0.12); }

  .series-switch {
    position: relative;
    display: block;
    width: 46px;
    height: 24px;
    border-radius: 100px;
  }
  .series-switch--generated { background: #22ae87; }
  .series-switch--consumed  { background: #159ee0; }

  .series-switch i {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    transform: translateX(22px);
  }
</style>
</head>
<body>
  <section class="energy-card" aria-label="Energy Generated Vs Consumed">
    <div class="card-header">
      <h2>Energy Genrated Vs Consumed</h2>
      <button class="period-select" type="button">
        Today
        <svg width="12" height="8" viewBox="0 0 12 8" fill="none" aria-hidden="true">
          <path d="M1 1.5 6 6.5 11 1.5" stroke="#2D8CFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>

    <svg class="power-output-chart" viewBox="0 0 332 250" role="img" aria-label="Generated and consumed energy throughout the day">
      <defs>
        <linearGradient id="generated-area" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#5ECD0D" stop-opacity="0.7" />
          <stop offset="1" stop-color="#5ECD0D" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="consumed-area" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#22B5FF" stop-opacity="0.17" />
          <stop offset="1" stop-color="#22B5FF" stop-opacity="0" />
        </linearGradient>
        <pattern id="grid" x="39" y="16" width="24.4" height="21.3" patternUnits="userSpaceOnUse">
          <path d="M0 0 H24.4 M0 0 V21.3" stroke="rgba(255,255,255,0.045)" stroke-width="1" fill="none" />
        </pattern>
      </defs>

      <!-- grid background -->
      <rect x="39" y="16" width="293" height="213" fill="url(#grid)" />

      <!-- axis labels -->
      <text x="34" y="28"  text-anchor="end" class="power-axis-label">50 kWh</text>
      <text x="34" y="65"  text-anchor="end" class="power-axis-label">40 kWh</text>
      <text x="34" y="102" text-anchor="end" class="power-axis-label">30 kWh</text>
      <text x="34" y="139" text-anchor="end" class="power-axis-label">20 kWh</text>
      <text x="34" y="176" text-anchor="end" class="power-axis-label">10 kWh</text>
      <text x="34" y="213" text-anchor="end" class="power-axis-label">0</text>

      <text x="56"  y="246" text-anchor="middle" class="power-axis-label">6am</text>
      <text x="100" y="246" text-anchor="middle" class="power-axis-label">9am</text>
      <text x="144" y="246" text-anchor="middle" class="power-axis-label">12am</text>
      <text x="188" y="246" text-anchor="middle" class="power-axis-label">3pm</text>
      <text x="232" y="246" text-anchor="middle" class="power-axis-label">6pm</text>
      <text x="276" y="246" text-anchor="middle" class="power-axis-label">9pm</text>
      <text x="320" y="246" text-anchor="middle" class="power-axis-label">12pm</text>

      <!-- generated (green) -->
      <path d="M39 229 C75 229 86 209 103 143 C119 82 137 63 168 62 C201 61 220 76 235 139 C249 199 275 222 332 229 L332 229 L39 229 Z" fill="url(#generated-area)" fill-opacity="0.25" />
      <path d="M39 229 C75 229 86 209 103 143 C119 82 137 63 168 62 C201 61 220 76 235 139 C249 199 275 222 332 229" fill="none" stroke="#21A17D" stroke-width="2.5" stroke-linecap="round" />

      <!-- consumed (blue) -->
      <path d="M39 229 C78 229 94 211 114 171 C130 140 149 126 176 126 C202 126 222 141 242 178 C260 211 284 224 332 229 L332 229 L39 229 Z" fill="url(#consumed-area)" />
      <path d="M39 229 C78 229 94 211 114 171 C130 140 149 126 176 126 C202 126 222 141 242 178 C260 211 284 224 332 229" fill="none" stroke="#0087CE" stroke-width="2.5" stroke-linecap="round" />
    </svg>

    <div class="power-series-control" aria-label="Chart series">
      <button class="series-toggle" type="button" aria-pressed="true">
        <span class="series-switch series-switch--generated"><i></i></span>
        <small>Generated</small>
      </button>
      <span class="series-divider"></span>
      <button class="series-toggle" type="button" aria-pressed="true">
        <span class="series-switch series-switch--consumed"><i></i></span>
        <small>Consumed</small>
      </button>
    </div>
  </section>
</body>
</html>
